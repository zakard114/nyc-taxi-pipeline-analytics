# Full TLC batch pipeline as a Kestra DAG: download → GCS upload → BigQuery load.
# Mirrors scripts/ingest_tlc_2019_2020.py stages (--download-only, --upload-only, --bq-only).
#
# Prerequisites (same as other flows):
#   - KV: GCP_BUCKET, GCP_CREDS (JSON string)
#   - docker-compose: repo mounted at /workspace, Docker socket available (see README)
#   - terraform/gcp-creds.json present on host (mounted into /workspace/terraform/)
#
# Requires Docker inside the Kestra container (docker.sock). Each step runs python:3.12-slim
# with pip install from requirements-ingest.txt (idempotent; cache-friendly on repeat runs).

id: nyc_taxi_ingest_pipeline
namespace: system

description: |
  Orchestrated end-to-end NYC TLC ingest (2019–2020 Yellow/Green): download monthly Parquet,
  upload raw files to GCS, merge + load merged Parquet into BigQuery with partition/cluster.
  Implemented as three dependent tasks calling the same Python entrypoint as local runs.

variables:
  project_id: "zakard-de-project"
  bq_dataset: "trips_data_all"

tasks:
  - id: tlc_download
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        set -e
        docker run --rm \
          -v /workspace:/workspace \
          -w /workspace \
          -e GCP_PROJECT_ID="{{ vars.project_id }}" \
          -e GCS_BUCKET="{{ kv('GCP_BUCKET') | trim }}" \
          -e BQ_DATASET="{{ vars.bq_dataset }}" \
          -e GOOGLE_APPLICATION_CREDENTIALS=/workspace/terraform/gcp-creds.json \
          -e GCP_CREDS_PATH=/workspace/terraform/gcp-creds.json \
          python:3.12-slim bash -c "pip install --no-cache-dir -q -r /workspace/requirements-ingest.txt && python scripts/ingest_tlc_2019_2020.py --download-only"

  - id: tlc_upload
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    dependsOn:
      - tlc_download
    commands:
      - |
        set -e
        docker run --rm \
          -v /workspace:/workspace \
          -w /workspace \
          -e GCP_PROJECT_ID="{{ vars.project_id }}" \
          -e GCS_BUCKET="{{ kv('GCP_BUCKET') | trim }}" \
          -e BQ_DATASET="{{ vars.bq_dataset }}" \
          -e GOOGLE_APPLICATION_CREDENTIALS=/workspace/terraform/gcp-creds.json \
          -e GCP_CREDS_PATH=/workspace/terraform/gcp-creds.json \
          python:3.12-slim bash -c "pip install --no-cache-dir -q -r /workspace/requirements-ingest.txt && python scripts/ingest_tlc_2019_2020.py --upload-only"

  - id: tlc_bigquery
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    dependsOn:
      - tlc_upload
    commands:
      - |
        set -e
        docker run --rm \
          -v /workspace:/workspace \
          -w /workspace \
          -e GCP_PROJECT_ID="{{ vars.project_id }}" \
          -e GCS_BUCKET="{{ kv('GCP_BUCKET') | trim }}" \
          -e BQ_DATASET="{{ vars.bq_dataset }}" \
          -e GOOGLE_APPLICATION_CREDENTIALS=/workspace/terraform/gcp-creds.json \
          -e GCP_CREDS_PATH=/workspace/terraform/gcp-creds.json \
          python:3.12-slim bash -c "pip install --no-cache-dir -q -r /workspace/requirements-ingest.txt && python scripts/ingest_tlc_2019_2020.py --bq-only"
