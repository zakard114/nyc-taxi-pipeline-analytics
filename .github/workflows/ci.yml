# CI: static checks only — no GCP deploy, no BigQuery runs (aligns with portfolio / cohort safety).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check scripts tests dlt

      - name: README TOC anchors
        run: python scripts/verify_readme_anchors.py

      - name: Python syntax (compileall)
        run: python -m compileall -q scripts tests

      - name: Pytest (unit tests)
        run: pytest tests -q

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
